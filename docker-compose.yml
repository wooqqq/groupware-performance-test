version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: groupware-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: groupware
      MYSQL_USER: groupware
      MYSQL_PASSWORD: groupware123
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: groupware-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: groupware-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: groupware-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  ngrinder-controller:
    image: ngrinder/controller:3.5.9-p1
    container_name: groupware-ngrinder-controller
    ports:
      - "9001:80"
      - "16001:16001"
      - "12000-12009:12000-12009"
    volumes:
      - ngrinder-controller-data:/opt/ngrinder-controller

  ngrinder-agent:
    image: ngrinder/agent:3.5.9-p1
    container_name: groupware-ngrinder-agent
    depends_on:
      - ngrinder-controller
    command: ngrinder-controller
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql-data:
  redis-data:
  grafana-data:
  ngrinder-controller-data:
