spring:
  datasource:
    url: jdbc:mysql://localhost:3306/groupware?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: groupware
    password: groupware123
    hikari:
      # 레거시 대비 포인트: 커넥션 풀 설정으로 동시 접속 대응
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: GroupwareHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Actuator + Prometheus 메트릭 노출
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, hikaricp
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: groupware
    distribution:
      percentiles-histogram:
        http.server.requests: true  # P50, P95, P99 응답시간 추적
